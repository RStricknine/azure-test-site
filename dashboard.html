<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roy Test Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .metric {
      font-size: 32px;
      font-weight: bold;
      margin-top: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    th, td {
      text-align: left;
      padding: 14px;
      border-bottom: 1px solid #e8e8e8;
    }

    th {
      background: #f0f3f6;
    }

    .status {
      margin-top: 15px;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Roy Test Dashboard</h1>

  <div class="grid">
    <div class="card">
      <div>Total Customers</div>
      <div class="metric" id="totalCustomers">Loading...</div>
    </div>
  </div>

  <h2>Recent Customers</h2>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Created</th>
      </tr>
    </thead>
    <tbody id="customerRows">
      <tr>
        <td colspan="3">Loading...</td>
      </tr>
    </tbody>
  </table>

  <div class="status" id="status"></div>

  <script>
    async function loadDashboard() {
      const status = document.getElementById("status");

      try {
        const dashboardResponse = await fetch("/api/getDashboard");
        const dashboardData = await dashboardResponse.json();

        document.getElementById("totalCustomers").textContent =
          dashboardData.totalCustomers;

        const customersResponse = await fetch("/api/getCustomers");
        const customers = await customersResponse.json();

        const tbody = document.getElementById("customerRows");
        tbody.innerHTML = "";

        if (!customers.length) {
          tbody.innerHTML = `<tr><td colspan="3">No customers yet.</td></tr>`;
        } else {
          customers.forEach(c => {
            const tr = document.createElement("tr");

            const created = c.created_at
              ? new Date(c.created_at).toLocaleString()
              : "";

            tr.innerHTML = `
              <td>${c.name || ""}</td>
              <td>${c.email || ""}</td>
              <td>${created}</td>
            `;

            tbody.appendChild(tr);
          });
        }

        status.textContent = "Dashboard loaded successfully.";
      } catch (error) {
        status.textContent = "Error loading dashboard: " + error.message;
      }
    }

    loadDashboard();
  </script>
</body>
</html>
